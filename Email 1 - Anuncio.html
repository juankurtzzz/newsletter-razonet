  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: swap;\n  src: url(\"d31a3f3a-e1a8-4ee9-b9a3-30550ff1950b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* ===========================================================================\n   Razonet — Color tokens\n   Source: brand_style_guide.md (MIV Razonet) + production landing pages\n   =========================================================================== */\n:root {\n  /* ---- Brand core ---- */\n  --rz-blue: #0171eb;            /* Blue Razonet — primary. Logo, CTAs, links, icons */\n  --rz-navy: #003159;            /* Dark Blue — headings, dark surfaces, logo wordmark */\n  --rz-navy-deep: #1c232d;       /* Darker Blue — deepest surfaces, footers, contrast */\n\n  /* ---- Blue scale ---- */\n  --rz-blue-light: #cce3fb;      /* Light Blue — tint backgrounds, soft fills */\n  --rz-blue-medium-light: #4b9af1;/* Medium Light Blue — accents on dark, hover glints */\n  --rz-blue-medium-dark: #0151a2;/* Medium Dark Blue — pressed/hover on primary */\n  --rz-blue-hover: #015cc4;      /* Production hover for primary buttons */\n\n  /* ---- Neutrals ---- */\n  --rz-white: #ffffff;\n  --rz-off-white: #eff3f8;       /* Off White — page tints, card fills on white */\n  --rz-rose: #f8e5e3;            /* Rose — human/warm tone, gradient stop */\n\n  /* ---- Ink (production, derived from navy) ---- */\n  --rz-text: #1f2d4a;            /* Body copy */\n  --rz-text-muted: #5a6e8c;      /* Secondary copy, captions */\n  --rz-border: #d8e1ee;          /* Hairlines, input borders, dividers */\n  --rz-navy-darkest: #001f3a;    /* Deep footer / hero overlays */\n\n  /* ---- Status (line-icon era, derived to sit beside the blue) ---- */\n  --rz-success: #1d9d6b;\n  --rz-success-bg: #e3f6ee;\n  --rz-warning: #d98a04;\n  --rz-warning-bg: #fdf2dc;\n  --rz-danger: #d64545;\n  --rz-danger-bg: #fceaea;\n\n  /* ---- Brand gradient (acolhedor — never behind the logo) ---- */\n  --rz-gradient-brand: linear-gradient(120deg, var(--rz-blue-light) 0%, var(--rz-off-white) 50%, var(--rz-rose) 100%);\n\n  /* ---- Plan accents (per brand guide) ---- */\n  --rz-plan-mei: #0171eb;\n  --rz-plan-mei-soft: #eff3f8;\n  --rz-plan-simples: #003159;\n  --rz-plan-simples-soft: #ffffff;\n  --rz-plan-comercio: #1c232d;\n  --rz-plan-comercio-soft: #eff3f8;\n\n  /* ===========================================================\n     Semantic aliases — prefer these in components\n     =========================================================== */\n  --color-bg: var(--rz-white);\n  --color-bg-subtle: var(--rz-off-white);\n  --color-bg-inverse: var(--rz-navy);\n  --color-bg-inverse-deep: var(--rz-navy-deep);\n\n  --surface-card: var(--rz-white);\n  --surface-card-subtle: var(--rz-off-white);\n  --surface-tint: var(--rz-blue-light);\n\n  --text-heading: var(--rz-navy);\n  --text-body: var(--rz-text);\n  --text-muted: var(--rz-text-muted);\n  --text-on-brand: var(--rz-white);\n  --text-on-inverse: var(--rz-off-white);\n  --text-link: var(--rz-blue);\n\n  --border-default: var(--rz-border);\n  --border-strong: #b9c6d9;\n\n  --action-primary: var(--rz-blue);\n  --action-primary-hover: var(--rz-blue-hover);\n  --action-primary-active: var(--rz-blue-medium-dark);\n  --focus-ring: rgba(1, 113, 235, 0.32);\n}\n<\u002Fstyle>\n<style>/* ===========================================================================\n   Razonet — Typography tokens\n   Titles → Source Sans 3 (Bold/Black for impact, SemiBold for highlights)\n   Body   → Inter (Regular/Medium; big-numbers & dashboards)\n   =========================================================================== */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-mono: 'Inter', ui-monospace, 'SF Mono', Menlo, monospace; /* numerics use Inter tabular */\n\n  /* ---- Weights ---- */\n  --fw-light: 300;       /* @kind font */\n  --fw-regular: 400;    /* @kind font */\n  --fw-medium: 500;     /* @kind font */\n  --fw-semibold: 600;   /* @kind font */\n  --fw-bold: 700;       /* @kind font */\n  --fw-black: 900;      /* @kind font */\n\n  /* ---- Type scale (rem) ---- */\n  --fs-display: 4rem;     /* 64 — hero / título principal (Bold/Black) */\n  --fs-h1: 3rem;          /* 48 */\n  --fs-h2: 2.25rem;       /* 36 */\n  --fs-h3: 1.5rem;        /* 24 */\n  --fs-h4: 1.25rem;       /* 20 */\n  --fs-lead: 1.1875rem;   /* 19 — subtítulo / lede */\n  --fs-body: 1.0625rem;   /* 17 — corpo padrão web */\n  --fs-body-sm: 0.9375rem;/* 15 */\n  --fs-caption: 0.8125rem;/* 13 — eyebrows, captions, labels */\n  --fs-micro: 0.75rem;    /* 12 — disclaimers */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.05;       /* @kind other */\n  --lh-snug: 1.25;        /* @kind other */\n  --lh-normal: 1.5;       /* @kind other */\n  --lh-relaxed: 1.65;     /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight: -0.03em;    /* @kind other */\n  --ls-normal: 0;         /* @kind other */\n  --ls-wide: 0.10em;      /* @kind other */\n\n  /* ===== Semantic roles ===== */\n  --text-display-font: var(--font-display);\n  --text-display-weight: var(--fw-black);\n  --text-heading-font: var(--font-display);\n  --text-heading-weight: var(--fw-bold);\n  --text-highlight-weight: var(--fw-semibold);\n  --text-body-font: var(--font-body);\n  --text-body-weight: var(--fw-regular);\n  --text-eyebrow-weight: var(--fw-bold);\n}\n<\u002Fstyle>\n<style>/* ===========================================================================\n   Razonet — Spacing, radii, shadows, motion\n   Border-radius rule (MIV): ~5% of the shape's smaller side → seriedade + leveza.\n   Production scale below codifies that into named steps.\n   =========================================================================== */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;   /* section padding (desktop) */\n\n  /* ---- Radii ---- */\n  --radius-sm: 5px;     /* small chips / tags */\n  --radius-md: 10px;    /* inputs, buttons */\n  --radius-lg: 14px;    /* icon tiles, small cards */\n  --radius-xl: 20px;    /* cards, form panels */\n  --radius-2xl: 24px;   /* feature cards, hero panels */\n  --radius-pill: 999px; /* pill buttons, badges */\n\n  /* ---- Elevation (tinted with navy, never neutral grey) ---- */\n  --shadow-xs: 0 1px 2px rgba(0, 49, 89, 0.06);\n  --shadow-sm: 0 2px 8px rgba(0, 49, 89, 0.06);\n  --shadow-md: 0 8px 24px rgba(0, 49, 89, 0.08);\n  --shadow-lg: 0 24px 60px rgba(0, 49, 89, 0.18);\n  --shadow-brand: 0 12px 28px rgba(1, 113, 235, 0.30); /* glow under primary CTAs */\n\n  /* ---- Layout ---- */\n  --container-max: 1200px;  /* @kind spacing */\n  --container-pad: 24px;    /* @kind spacing */\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast: 0.12s;     /* @kind other */\n  --dur-base: 0.2s;      /* @kind other */\n  --dur-slow: 0.4s;      /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ===========================================================================\n   Razonet Design System — global entry point.\n   Consumers link THIS file. Keep it to @import lines only.\n   =========================================================================== */\n/* ===========================================================================\n   Razonet — Webfonts\n   Titles: Source Sans 3 (humanist sans).  Body: Inter (digital sans).\n   Loaded from Google Fonts; both are the brand's specified families.\n   =========================================================================== */\n/* cyrillic-ext */\n@font-face {\n  font lue Razonet — primary. Logo, CTAs, links, icons */\n  --rz-navy: #003159;            /* Dark Blue — headings, dark surfaces, logo wordmark */\n  --rz-navy-deep: #1c232d;       /* Darker Blue — deepest surfaces, footers, contrast */\n\n  /* ---- Blue scale ---- */\n  --rz-blue-light: #cce3fb;      /* Light Blue — tint backgrounds, soft fills */\n  --rz-blue-medium-light: #4b9af1;/* Medium Light Blue — accents on dark, hover glints */\n  --rz-blue-medium-dark: #0151a2;/* Medium Dark Blue — pressed/hover on primary */\n  --rz-blue-hover: #015cc4;      /* Production hover for primary buttons */\n\n  /* ---- Neutrals ---- */\n  --rz-white: #ffffff;\n  --rz-off-white: #eff3f8;       /* Off White — page tints, card fills on white */\n  --rz-rose: #f8e5e3;            /* Rose — human/warm tone, gradient stop */\n\n  /* ---- Ink (production, derived from navy) ---- */\n  --rz-text: #1f2d4a;            /* Body copy */\n  --rz-text-muted: #5a6e8c;      /* Secondary copy, captions */\n  --rz-border: #d8e1ee;          /* Hairlines, input borders, dividers */\n  --rz-navy-darkest: #001f3a;    /* Deep footer / hero overlays */\n\n  /* ---- Status (line-icon era, derived to sit beside the blue) ---- */\n  --rz-success: #1d9d6b;\n  --rz-success-bg: #e3f6ee;\n  --rz-warning: #d98a04;\n  --rz-warning-bg: #fdf2dc;\n  --rz-danger: #d64545;\n  --rz-danger-bg: #fceaea;\n\n  /* ---- Brand gradient (acolhedor — never behind the logo) ---- */\n  --rz-gradient-brand: linear-gradient(120deg, var(--rz-blue-light) 0%, var(--rz-off-white) 50%, var(--rz-rose) 100%);\n\n  /* ---- Plan accents (per brand guide) ---- */\n  --rz-plan-mei: #0171eb;\n  --rz-plan-mei-soft: #eff3f8;\n  --rz-plan-simples: #003159;\n  --rz-plan-simples-soft: #ffffff;\n  --rz-plan-comercio: #1c232d;\n  --rz-plan-comercio-soft: #eff3f8;\n\n  /* ===========================================================\n     Semantic aliases — prefer these in components\n     =========================================================== */\n  --color-bg: var(--rz-white);\n  --color-bg-subtle: var(--rz-off-white);\n  --color-bg-inverse: var(--rz-navy);\n  --color-bg-inverse-deep: var(--rz-navy-deep);\n\n  --surface-card: var(--rz-white);\n  --surface-card-subtle: var(--rz-off-white);\n  --surface-tint: var(--rz-blue-light);\n\n  --text-heading: var(--rz-navy);\n  --text-body: var(--rz-text);\n  --text-muted: var(--rz-text-muted);\n  --text-on-brand: var(--rz-white);\n  --text-on-inverse: var(--rz-off-white);\n  --text-link: var(--rz-blue);\n\n  --border-default: var(--rz-border);\n  --border-strong: #b9c6d9;\n\n  --action-primary: var(--rz-blue);\n  --action-primary-hover: var(--rz-blue-hover);\n  --action-primary-active: var(--rz-blue-medium-dark);\n  --focus-ring: rgba(1, 113, 235, 0.32);\n}\n\n/* ===========================================================================\n   Razonet — Typography tokens\n   Titles → Source Sans 3 (Bold/Black for impact, SemiBold for highlights)\n   Body   → Inter (Regular/Medium; big-numbers & dashboards)\n   =========================================================================== */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Source Sans 3', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-mono: 'Inter', ui-monospace, 'SF Mono', Menlo, monospace; /* numerics use Inter tabular */\n\n  /* ---- Weights ---- */\n  --fw-light: 300;       /* @kind font */\n  --fw-regular: 400;    /* @kind font */\n  --fw-medium: 500;     /* @kind font */\n  --fw-semibold: 600;   /* @kind font */\n  --fw-bold: 700;       /* @kind font */\n  --fw-black: 900;      /* @kind font */\n\n  /* ---- Type scale (rem) ---- */\n  --fs-display: 4rem;     /* 64 — hero / título principal (Bold/Black) */\n  --fs-h1: 3rem;          /* 48 */\n  --fs-h2: 2.25rem;       /* 36 */\n  --fs-h3: 1.5rem;        /* 24 */\n  --fs-h4: 1.25rem;       /* 20 */\n  --fs-lead: 1.1875rem;   /* 19 — subtítulo / lede */\n  --fs-body: 1.0625rem;   /* 17 — corpo padrão web */\n  --fs-body-sm: 0.9375rem;/* 15 */\n  --fs-caption: 0.8125rem;/* 13 — eyebrows, captions, labels */\n  --fs-micro: 0.75rem;    /* 12 — disclaimers */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.05;       /* @kind other */\n  --lh-snug: 1.25;        /* @kind other */\n  --lh-normal: 1.5;       /* @kind other */\n  --lh-relaxed: 1.65;     /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-tight: -0.03em;    /* @kind other */\n  --ls-normal: 0;         /* @kind other */\n  --ls-wide: 0.10em;      /* @kind other */\n\n  /* ===== Semantic roles ===== */\n  --text-display-font: var(--font-display);\n  --text-display-weight: var(--fw-black);\n  --text-heading-font: var(--font-display);\n  --text-heading-weight: var(--fw-bold);\n  --text-highlight-weight: var(--fw-semibold);\n  --text-body-font: var(--font-body);\n  --text-body-weight: var(--fw-regular);\n  --text-eyebrow-weight: var(--fw-bold);\n}\n\n/* ===========================================================================\n   Razonet — Spacing, radii, shadows, motion\n   Border-radius rule (MIV): ~5% of the shape's smaller side → seriedade + leveza.\n   Production scale below codifies that into named steps.\n   =========================================================================== */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;   /* section padding (desktop) */\n\n  /* ---- Radii ---- */\n  --radius-sm: 5px;     /* small chips / tags */\n  --radius-md: 10px;    /* inputs, buttons */\n  --radius-lg: 14px;    /* icon tiles, small cards */\n  --radius-xl: 20px;    /* cards, form panels */\n  --radius-2xl: 24px;   /* feature cards, hero panels */\n  --radius-pill: 999px; /* pill buttons, badges */\n\n  /* ---- Elevation (tinted with navy, never neutral grey) ---- */\n  --shadow-xs: 0 1px 2px rgba(0, 49, 89, 0.06);\n  --shadow-sm: 0 2px 8px rgba(0, 49, 89, 0.06);\n  --shadow-md: 0 8px 24px rgba(0, 49, 89, 0.08);\n  --shadow-lg: 0 24px 60px rgba(0, 49, 89, 0.18);\n  --shadow-brand: 0 12px 28px rgba(1, 113, 235, 0.30); /* glow under primary CTAs */\n\n  /* ---- Layout ---- */\n  --container-max: 1200px;  /* @kind spacing */\n  --container-pad: 24px;    /* @kind spacing */\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */\n  --dur-fast: 0.12s;     /* @kind other */\n  --dur-base: 0.2s;      /* @kind other */\n  --dur-slow: 0.4s;      /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\n  body { font-family: 'Inter', system-ui, sans-serif; background: var(--rz-off-white); margin:0; }\n  .em-h { font-family: 'Source Sans 3', system-ui, sans-serif; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"padding:32px 16px; display:flex; justify-content:center;\">\n<div style=\"width:600px; max-width:100%; background:#fff; border-radius:4px; box-shadow:0 1px 3px rgba(0,49,89,.10); overflow:hidden;\">\n  <!-- header -->\n  <div style=\"padding:22px 40px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--rz-border);\">\n    <img src=\"b6bc7e85-6ae8-46b7-a179-b1e600caa2c3\" alt=\"Razonet\" style=\"height:24px; display:block;\">\n    <span style=\"font:600 11px/1 'Inter',sans-serif; letter-spacing:.14em; text-transform:uppercase; color:var(--rz-blue);\">App Razonet<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- hero navy -->\n  <div style=\"position:relative; background:var(--rz-navy); padding:48px 40px 40px; overflow:hidden;\">\n    <div style=\"position:absolute; top:0; right:0; bottom:0; width:320px; background:url(&quot;f721009b-d544-4b1a-911d-6460a5ba18db&quot;) repeat; background-size:30px 30px; opacity:.16; pointer-events:none; -webkit-mask-image:linear-gradient(to left, #000, transparent); mask-image:linear-gradient(to left, #000, transparent);\"><\u002Fdiv>\n    <div style=\"position:relative;\">\n      <span style=\"display:inline-block; font:700 11px/1 'Inter',sans-serif; letter-spacing:.16em; text-transform:uppercase; color:var(--rz-blue-medium-light); margin-bottom:18px;\">Nova versão disponível<\u002Fspan>\n      <h1 class=\"em-h\" style=\"margin:0 0 16px; font-size:34px; line-height:1.12; letter-spacing:-0.03em; font-weight:800; color:#fff; max-width:480px;\">Chegou a Razonet V3, mais rápida e feita pra você.<\u002Fh1>\n      <p style=\"margin:0; font-size:16px; line-height:1.6; color:var(--rz-blue-light); max-width:440px;\">A nova versão do app já está no ar. A migração começou e é simples. Você não precisa fazer nada sozinho, a gente organiza tudo com você.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- screenshot -->\n  <div style=\"padding:32px 40px 8px; background:var(--rz-off-white);\">\n    <img src=\"df9cc335-91ae-4dc8-9b00-113c0f83163f\" alt=\"Tela da Razonet V3\" style=\"width:100%; display:block; border-radius:14px; border:1px solid var(--rz-border); box-shadow:0 18px 44px rgba(0,49,89,.18);\">\n  <\u002Fdiv>\n\n  <!-- deadline + cta -->\n  <div style=\"padding:28px 40px 40px; background:var(--rz-off-white); text-align:center;\">\n    <div style=\"display:inline-flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--rz-border); border-radius:999px; padding:9px 18px; margin-bottom:24px;\">\n      <span style=\"width:8px; height:8px; border-radius:50%; background:var(--rz-blue); display:inline-block;\"><\u002Fspan>\n      <span style=\"font:600 14px/1 'Inter',sans-serif; color:var(--rz-text);\">Migre até <strong style=\"color:var(--rz-navy);\">31/07<\u002Fstrong> para continuar com tudo funcionando.<\u002Fspan>\n    <\u002Fdiv>\n    <div>\n      <a href=\"#\" style=\"display:inline-block; background:var(--rz-blue); color:#fff; font:700 16px/1 'Inter',sans-serif; padding:17px 36px; border-radius:999px; text-decoration:none; box-shadow:0 12px 28px rgba(1,113,235,.30);\">Migrar para a V3<\u002Fa>\n    <\u002Fdiv>\n    <p style=\"margin:18px 0 0; font-size:13px; color:var(--rz-text-muted);\">Leva poucos minutos. Seus dados continuam todos lá.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- footer -->\n  <div style=\"background:var(--rz-navy-deep); padding:30px 40px;\">\n    <img src=\"abc1a9e6-b34e-449d-b9e5-2ea63136809b\" alt=\"Razonet\" style=\"height:20px; display:block; margin-bottom:14px;\">\n    <p style=\"margin:0 0 12px; font:600 14px/1.4 'Source Sans 3',sans-serif; color:#fff;\">Você foca em empreender. A Razonet cuida do resto.<\u002Fp>\n    <p style=\"margin:0; font-size:12px; line-height:1.6; color:var(--rz-blue-light); opacity:.85;\">Razonet · razonet.com.br · Alguma dúvida sobre a migração? Fale com a gente no WhatsApp.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
